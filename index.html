<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultimate Tic-Tac-Toe</title>
  <style>
    /* ── Custom properties ─────────────────────────────────────── */
    :root {
      --bg:              #1a1a2e;
      --surface:         #16213e;
      --board-gap-color: #0d0d1a;
      --macro-bg:        #16213e;
      --macro-gap-color: #0a1628;
      --macro-active-bg: #0d2a4a;
      --macro-active-border: #4fc3f7;
      --macro-won-x-bg:  rgba(239, 71, 111, 0.12);
      --macro-won-o-bg:  rgba(6, 214, 160, 0.12);
      --macro-draw-bg:   rgba(0, 0, 0, 0.35);
      --cell-bg:         #1e2d45;
      --cell-hover-bg:   #2a4060;
      --x-color:         #ef476f;
      --o-color:         #06d6a0;
      --text:            #e8eaf0;
      --muted:           #667;
      --control-bg:      #1e2d45;
      --control-border:  #2a4060;
      --btn-bg:          #0f3460;
      --btn-hover:       #1a4a80;
    }

    /* ── Reset & base ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 1.5rem 1rem;
    }

    /* ── App shell ─────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.1rem;
      width: 100%;
      max-width: 600px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
    }

    /* ── Controls ──────────────────────────────────────────────── */
    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    #controls select,
    #controls button {
      background: var(--btn-bg);
      color: var(--text);
      border: 1px solid var(--control-border);
      border-radius: 6px;
      padding: 0.45rem 0.85rem;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    #controls select:hover,
    #controls button:hover { background: var(--btn-hover); }

    #controls button#new-game {
      background: #0f3460;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .difficulty-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: #aab;
    }
    .difficulty-wrap input[type=range] {
      width: 90px;
      accent-color: var(--macro-active-border);
    }
    #iter-display {
      min-width: 2.8rem;
      text-align: right;
      color: var(--text);
    }

    /* ── Status bar ────────────────────────────────────────────── */
    #status {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      min-height: 1.6rem;
    }
    #status.turn-X  { color: var(--x-color); }
    #status.turn-O  { color: var(--o-color); }
    #status.win-X   { color: var(--x-color); }
    #status.win-O   { color: var(--o-color); }
    #status.draw    { color: var(--muted); }
    #status.thinking { color: var(--macro-active-border); }

    /* ── Main board ────────────────────────────────────────────── */
    #board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      background: var(--board-gap-color);
      border: 7px solid var(--board-gap-color);
      border-radius: 6px;
      width: 100%;
      max-width: 560px;
    }

    /* ── Macro-cell (one of the 9 sub-boards) ──────────────────── */
    .macro-cell {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      background: var(--macro-gap-color);
      border: 3px solid transparent;
      border-radius: 3px;
      padding: 4px;
      position: relative;
      transition: border-color 0.18s, background 0.18s;
    }

    .macro-cell.active {
      border-color: var(--macro-active-border);
      background: var(--macro-active-bg);
    }

    /* Decided macro-cells: no pointer events on their buttons */
    .macro-cell.won-X .cell,
    .macro-cell.won-O .cell,
    .macro-cell.drawn .cell { pointer-events: none; }

    /* ── Macro winner / draw overlay ───────────────────────────── */
    .macro-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 900;
      border-radius: 2px;
      z-index: 2;
      pointer-events: none;
    }
    .macro-cell.won-X .macro-overlay {
      color: var(--x-color);
      background: var(--macro-won-x-bg);
      text-shadow: 0 0 20px rgba(239,71,111,0.5);
    }
    .macro-cell.won-O .macro-overlay {
      color: var(--o-color);
      background: var(--macro-won-o-bg);
      text-shadow: 0 0 20px rgba(6,214,160,0.4);
    }
    .macro-cell.drawn .macro-overlay {
      color: var(--muted);
      background: var(--macro-draw-bg);
      font-size: clamp(1.5rem, 6vw, 2.5rem);
    }

    /* ── Individual cell buttons ───────────────────────────────── */
    .cell {
      aspect-ratio: 1;
      background: var(--cell-bg);
      border: none;
      border-radius: 2px;
      cursor: pointer;
      font-size: clamp(0.75rem, 3vw, 1.1rem);
      font-weight: 800;
      color: var(--text);
      transition: background 0.1s, color 0.1s;
      /* Reserve space for content without layout shift */
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cell:hover:not(:disabled) { background: var(--cell-hover-bg); }
    .cell:disabled { cursor: default; }
    .cell.taken-X { color: var(--x-color); }
    .cell.taken-O { color: var(--o-color); }

    /* ── Responsive: tighten up on smaller screens ─────────────── */
    @media (max-width: 480px) {
      body { padding: 0.75rem 0.5rem; }
      #board { gap: 5px; border-width: 5px; }
      .macro-cell { gap: 2px; padding: 3px; border-width: 2px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════
     WORKER SOURCE  (loaded by worker-bridge as a Blob URL in Phase 3)
     Contains: game.js + mcts.js
     ═══════════════════════════════════════════════════════════════ -->
<script id="worker-src" type="text/plain">
/* ----------------------------------------------------------------
   game.js — Pure game logic (shared by main thread and Web Worker)
   ---------------------------------------------------------------- */

const WIN_PATTERNS = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function checkLocalWin(cells, player) {
  return WIN_PATTERNS.some(([a, b, c]) =>
    cells[a] === player && cells[b] === player && cells[c] === player
  );
}

function checkMacroWin(macroStatus, player) {
  return WIN_PATTERNS.some(([a, b, c]) =>
    macroStatus[a] === player && macroStatus[b] === player && macroStatus[c] === player
  );
}

function getLegalMoves(state) {
  const { boards, macroStatus, activeBoard } = state;
  const moves = [];
  const tryBoard = (b) => {
    if (macroStatus[b] !== null) return;
    for (let c = 0; c < 9; c++) {
      if (boards[b][c] === null) moves.push({ board: b, cell: c });
    }
  };
  if (activeBoard !== null) {
    if (macroStatus[activeBoard] === null) tryBoard(activeBoard);
    if (moves.length === 0) for (let b = 0; b < 9; b++) tryBoard(b);
  } else {
    for (let b = 0; b < 9; b++) tryBoard(b);
  }
  return moves;
}

function applyMove(state, boardIndex, cellIndex) {
  const { boards, macroStatus, currentPlayer } = state;
  const newBoards = boards.map((b, i) => i === boardIndex ? b.slice() : b);
  newBoards[boardIndex][cellIndex] = currentPlayer;
  const newMacroStatus = macroStatus.slice();
  if (newMacroStatus[boardIndex] === null) {
    const localCells = newBoards[boardIndex];
    if (checkLocalWin(localCells, currentPlayer)) {
      newMacroStatus[boardIndex] = currentPlayer;
    } else if (localCells.every(c => c !== null)) {
      newMacroStatus[boardIndex] = 'draw';
    }
  }
  const nextPlayer = currentPlayer === 'X' ? 'O' : 'X';
  const nextActive = newMacroStatus[cellIndex] === null ? cellIndex : null;
  return { boards: newBoards, macroStatus: newMacroStatus, currentPlayer: nextPlayer, activeBoard: nextActive };
}

function getWinner(state) {
  const { macroStatus } = state;
  if (checkMacroWin(macroStatus, 'X')) return 'X';
  if (checkMacroWin(macroStatus, 'O')) return 'O';
  if (macroStatus.every(s => s !== null)) return 'draw';
  if (getLegalMoves(state).length === 0) return 'draw';
  return null;
}

function isTerminal(state) { return getWinner(state) !== null; }

function createInitialState() {
  return {
    boards: Array.from({ length: 9 }, () => Array(9).fill(null)),
    macroStatus: Array(9).fill(null),
    currentPlayer: 'X',
    activeBoard: null
  };
}

/* ----------------------------------------------------------------
   mcts.js — Monte Carlo Tree Search Engine
   ---------------------------------------------------------------- */
const MCTS_C = Math.SQRT2;

function makeNode(state, parent, move) {
  return { state, parent, move, children: [], visits: 0, wins: 0,
           untriedMoves: getLegalMoves(state) };
}

function ucbSelect(node) {
  const logN = Math.log(node.visits);
  let best = null, bestScore = -Infinity;
  for (const child of node.children) {
    const score = child.visits === 0
      ? Infinity
      : (child.wins / child.visits) + MCTS_C * Math.sqrt(logN / child.visits);
    if (score > bestScore) { bestScore = score; best = child; }
  }
  return best;
}

function rollout(state) {
  let s = state;
  while (!isTerminal(s)) {
    const moves = getLegalMoves(s);
    const m = moves[Math.floor(Math.random() * moves.length)];
    s = applyMove(s, m.board, m.cell);
  }
  return getWinner(s);
}

function backprop(node, winner) {
  let n = node;
  while (n !== null) {
    n.visits++;
    // mover = player who moved TO reach this node (opponent of currentPlayer)
    const mover = n.state.currentPlayer === 'X' ? 'O' : 'X';
    if (winner === mover) n.wins++;
    n = n.parent;
  }
}

function mctsSearch(rootState, iterations) {
  const root = makeNode(rootState, null, null);

  for (let i = 0; i < iterations; i++) {
    // 1. Select
    let node = root;
    while (!isTerminal(node.state) && node.untriedMoves.length === 0) {
      node = ucbSelect(node);
    }
    // 2. Expand
    if (!isTerminal(node.state) && node.untriedMoves.length > 0) {
      const idx = Math.floor(Math.random() * node.untriedMoves.length);
      const move = node.untriedMoves.splice(idx, 1)[0];
      const child = makeNode(applyMove(node.state, move.board, move.cell), node, move);
      node.children.push(child);
      node = child;
    }
    // 3. Rollout
    const result = rollout(node.state);
    // 4. Backpropagate
    backprop(node, result);
  }

  // Best = most-visited child of root
  let best = null;
  for (const child of root.children) {
    if (!best || child.visits > best.visits) best = child;
  }
  return best ? best.move : getLegalMoves(rootState)[0];
}

/* ----------------------------------------------------------------
   Worker message handler
   ---------------------------------------------------------------- */
self.onmessage = function(e) {
  if (e.data.type === 'search') {
    const { state, iterations, id } = e.data;
    const move = mctsSearch(state, iterations);
    self.postMessage({ type: 'result', move, id });
  }
};
</script>

<!-- ═══════════════════════════════════════════════════════════════
     HTML STRUCTURE
     ═══════════════════════════════════════════════════════════════ -->
<div id="app">
  <h1>Ultimate Tic-Tac-Toe</h1>

  <div id="controls">
    <select id="mode-select" aria-label="Game mode">
      <option value="hvh">Human vs Human</option>
      <option value="hva-x">Human (X) vs AI</option>
      <option value="hva-o">Human (O) vs AI</option>
    </select>

    <div class="difficulty-wrap" id="difficulty-group" aria-label="AI difficulty">
      <span>AI:</span>
      <input type="range" id="difficulty" min="500" max="10000" step="500" value="2000"
             aria-label="AI iterations" />
      <span id="iter-display">2000</span>
    </div>

    <button id="new-game">New Game</button>
  </div>

  <div id="status" role="status" aria-live="polite"></div>
  <div id="board" role="grid" aria-label="Ultimate Tic-Tac-Toe board"></div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     MAIN THREAD SCRIPTS
     ═══════════════════════════════════════════════════════════════ -->
<script>
/* ----------------------------------------------------------------
   game.js (main-thread copy — identical to worker-src version)
   ---------------------------------------------------------------- */
const WIN_PATTERNS = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function checkLocalWin(cells, player) {
  return WIN_PATTERNS.some(([a, b, c]) =>
    cells[a] === player && cells[b] === player && cells[c] === player
  );
}

function checkMacroWin(macroStatus, player) {
  return WIN_PATTERNS.some(([a, b, c]) =>
    macroStatus[a] === player && macroStatus[b] === player && macroStatus[c] === player
  );
}

function getLegalMoves(state) {
  const { boards, macroStatus, activeBoard } = state;
  const moves = [];
  const tryBoard = (b) => {
    if (macroStatus[b] !== null) return;
    for (let c = 0; c < 9; c++) {
      if (boards[b][c] === null) moves.push({ board: b, cell: c });
    }
  };
  if (activeBoard !== null) {
    if (macroStatus[activeBoard] === null) tryBoard(activeBoard);
    if (moves.length === 0) for (let b = 0; b < 9; b++) tryBoard(b);
  } else {
    for (let b = 0; b < 9; b++) tryBoard(b);
  }
  return moves;
}

function applyMove(state, boardIndex, cellIndex) {
  const { boards, macroStatus, currentPlayer } = state;
  const newBoards = boards.map((b, i) => i === boardIndex ? b.slice() : b);
  newBoards[boardIndex][cellIndex] = currentPlayer;
  const newMacroStatus = macroStatus.slice();
  if (newMacroStatus[boardIndex] === null) {
    const localCells = newBoards[boardIndex];
    if (checkLocalWin(localCells, currentPlayer)) {
      newMacroStatus[boardIndex] = currentPlayer;
    } else if (localCells.every(c => c !== null)) {
      newMacroStatus[boardIndex] = 'draw';
    }
  }
  const nextPlayer = currentPlayer === 'X' ? 'O' : 'X';
  const nextActive = newMacroStatus[cellIndex] === null ? cellIndex : null;
  return { boards: newBoards, macroStatus: newMacroStatus, currentPlayer: nextPlayer, activeBoard: nextActive };
}

function getWinner(state) {
  const { macroStatus } = state;
  if (checkMacroWin(macroStatus, 'X')) return 'X';
  if (checkMacroWin(macroStatus, 'O')) return 'O';
  if (macroStatus.every(s => s !== null)) return 'draw';
  if (getLegalMoves(state).length === 0) return 'draw';
  return null;
}

function isTerminal(state) { return getWinner(state) !== null; }

function createInitialState() {
  return {
    boards: Array.from({ length: 9 }, () => Array(9).fill(null)),
    macroStatus: Array(9).fill(null),
    currentPlayer: 'X',
    activeBoard: null
  };
}

/* ----------------------------------------------------------------
   render.js — DOM construction and updates
   ---------------------------------------------------------------- */

/** Build the 81-button board DOM (called once on init). */
function buildBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';

  for (let b = 0; b < 9; b++) {
    const macroCell = document.createElement('div');
    macroCell.className = 'macro-cell';
    macroCell.dataset.board = b;
    macroCell.setAttribute('role', 'group');
    macroCell.setAttribute('aria-label', `Board ${b + 1}`);

    for (let c = 0; c < 9; c++) {
      const btn = document.createElement('button');
      btn.className = 'cell';
      btn.dataset.board = b;
      btn.dataset.cell = c;
      btn.setAttribute('aria-label', `Board ${b + 1}, cell ${c + 1}`);
      btn.addEventListener('click', () => onCellClick(b, c));
      macroCell.appendChild(btn);
    }

    boardEl.appendChild(macroCell);
  }
}

/**
 * Sync the entire DOM to the given state.
 * Cheap enough to run on every move (81 buttons, trivial diff).
 */
function render(state) {
  const { boards, macroStatus } = state;
  const winner = getWinner(state);
  const legalMoves = winner ? [] : getLegalMoves(state);
  const activeBoards = new Set(legalMoves.map(m => m.board));

  for (let b = 0; b < 9; b++) {
    const macroEl = document.querySelector(`.macro-cell[data-board="${b}"]`);
    const status = macroStatus[b];

    // Active highlight
    macroEl.classList.toggle('active', activeBoards.has(b));

    // Won / drawn classes + overlay
    macroEl.classList.remove('won-X', 'won-O', 'drawn');
    const existing = macroEl.querySelector('.macro-overlay');
    if (existing) existing.remove();

    if (status !== null) {
      if (status === 'X') macroEl.classList.add('won-X');
      else if (status === 'O') macroEl.classList.add('won-O');
      else macroEl.classList.add('drawn');

      const overlay = document.createElement('div');
      overlay.className = 'macro-overlay';
      overlay.setAttribute('aria-hidden', 'true');
      overlay.textContent = status === 'draw' ? '—' : status;
      macroEl.appendChild(overlay);
    }

    // Individual cells
    for (let c = 0; c < 9; c++) {
      const btn = macroEl.querySelector(`[data-cell="${c}"]`);
      const val = boards[b][c];

      btn.textContent = val ?? '';
      btn.classList.remove('taken-X', 'taken-O');
      if (val === 'X') btn.classList.add('taken-X');
      else if (val === 'O') btn.classList.add('taken-O');

      // Disable if: cell taken, board decided, not in legal set, or game over
      btn.disabled = val !== null || status !== null || !activeBoards.has(b) || winner !== null;

      // Update aria label with current value
      const row = Math.floor(c / 3) + 1;
      const col = (c % 3) + 1;
      btn.setAttribute('aria-label',
        `Board ${b + 1}, row ${row}, column ${col}${val ? ': ' + val : ''}`);
    }
  }

  updateStatus(state, winner);
}

function updateStatus(state, winner) {
  const el = document.getElementById('status');
  if (winner === 'X') {
    el.textContent = 'X wins!';
    el.className = 'win-X';
  } else if (winner === 'O') {
    el.textContent = 'O wins!';
    el.className = 'win-O';
  } else if (winner === 'draw') {
    el.textContent = "It's a draw!";
    el.className = 'draw';
  } else {
    el.textContent = `${state.currentPlayer}'s turn`;
    el.className = `turn-${state.currentPlayer}`;
  }
}

/* ----------------------------------------------------------------
   controller.js — Game flow and click handling
   ---------------------------------------------------------------- */

let gameState = null;
let aiThinking = false;

function getAIPlayer() {
  const mode = document.getElementById('mode-select').value;
  if (mode === 'hva-x') return 'O'; // human is X, AI is O
  if (mode === 'hva-o') return 'X'; // human is O, AI is X
  return null;
}

async function maybeRequestAI() {
  const aiPlayer = getAIPlayer();
  if (!aiPlayer || !gameState || getWinner(gameState)) return;
  if (gameState.currentPlayer !== aiPlayer) return;
  if (aiThinking) return;

  const stateAtSearch = gameState;
  aiThinking = true;
  const statusEl = document.getElementById('status');
  statusEl.textContent = 'AI thinking\u2026';
  statusEl.className = 'thinking';

  const iterations = parseInt(document.getElementById('difficulty').value, 10);
  const move = await requestAIMove(stateAtSearch, iterations);

  // Discard stale result if game was reset while thinking
  if (gameState !== stateAtSearch) { aiThinking = false; return; }

  aiThinking = false;
  gameState = applyMove(gameState, move.board, move.cell);
  render(gameState);
}

function init() {
  cancelAISearch();
  aiThinking = false;
  gameState = createInitialState();
  buildBoard();
  render(gameState);
  maybeRequestAI();
}

function onCellClick(boardIndex, cellIndex) {
  if (!gameState || getWinner(gameState) || aiThinking) return;

  // Block clicks when it's the AI's turn
  const aiPlayer = getAIPlayer();
  if (aiPlayer && gameState.currentPlayer === aiPlayer) return;

  const legal = getLegalMoves(gameState);
  if (!legal.some(m => m.board === boardIndex && m.cell === cellIndex)) return;

  gameState = applyMove(gameState, boardIndex, cellIndex);
  render(gameState);
  maybeRequestAI();
}

/* ----------------------------------------------------------------
   Controls wiring
   ---------------------------------------------------------------- */
document.getElementById('new-game').addEventListener('click', init);

const difficultySlider = document.getElementById('difficulty');
const iterDisplay = document.getElementById('iter-display');
difficultySlider.addEventListener('input', () => {
  iterDisplay.textContent = difficultySlider.value;
});

// Grey out difficulty controls when in Human vs Human mode
const modeSelect = document.getElementById('mode-select');
function syncDifficultyVisibility() {
  const isHvH = modeSelect.value === 'hvh';
  document.getElementById('difficulty-group').style.opacity = isHvH ? '0.35' : '1';
  document.getElementById('difficulty-group').style.pointerEvents = isHvH ? 'none' : '';
}
modeSelect.addEventListener('change', () => {
  syncDifficultyVisibility();
  if (!aiThinking) maybeRequestAI();
});

/* ----------------------------------------------------------------
   worker-bridge.js
   ---------------------------------------------------------------- */
let _worker = null;
let _pendingResolve = null;
let _currentSearchId = 0;

function getWorker() {
  if (_worker) return _worker;
  const src = document.getElementById('worker-src').textContent;
  const blob = new Blob([src], { type: 'application/javascript' });
  _worker = new Worker(URL.createObjectURL(blob));
  _worker.onmessage = (e) => {
    if (e.data.type === 'result' && _pendingResolve && e.data.id === _currentSearchId) {
      const resolve = _pendingResolve;
      _pendingResolve = null;
      resolve(e.data.move);
    }
  };
  return _worker;
}

function requestAIMove(state, iterations) {
  const id = ++_currentSearchId;
  return new Promise((resolve) => {
    _pendingResolve = resolve;
    getWorker().postMessage({ type: 'search', state, iterations, id });
  });
}

function cancelAISearch() {
  _pendingResolve = null;
  _currentSearchId++;
}

/* ----------------------------------------------------------------
   Phase 1 console test harness
   ---------------------------------------------------------------- */
function runPhase1Tests() {
  let passed = 0, failed = 0;
  const assert = (desc, ok) => {
    if (ok) { console.log(`  ✓  ${desc}`); passed++; }
    else     { console.error(`  ✗  ${desc}`); failed++; }
  };
  console.group('Phase 1 — Game Engine Tests');

  console.group('checkLocalWin');
  const c1 = Array(9).fill(null); c1[0]=c1[1]=c1[2]='X';
  assert('row win X', checkLocalWin(c1,'X'));
  assert('row win not O', !checkLocalWin(c1,'O'));
  const c2=Array(9).fill(null); c2[0]=c2[3]=c2[6]='O';
  assert('col win O', checkLocalWin(c2,'O'));
  const c3=Array(9).fill(null); c3[0]=c3[4]=c3[8]='X';
  assert('diag win X', checkLocalWin(c3,'X'));
  assert('empty no win', !checkLocalWin(Array(9).fill(null),'X'));
  console.groupEnd();

  console.group('checkMacroWin');
  const ms=Array(9).fill(null); ms[3]=ms[4]=ms[5]='O';
  assert('macro row O', checkMacroWin(ms,'O'));
  assert('macro not X', !checkMacroWin(ms,'X'));
  assert('all draw no win', !checkMacroWin(Array(9).fill('draw'),'X'));
  console.groupEnd();

  console.group('getLegalMoves');
  const s0=createInitialState();
  assert('81 moves initially', getLegalMoves(s0).length===81);
  const s1=applyMove(s0,4,4);
  const m1=getLegalMoves(s1);
  assert('constrained to board 4', m1.length===8 && m1.every(m=>m.board===4));
  console.groupEnd();

  console.group('applyMove');
  const sa=createInitialState(), sb=applyMove(sa,0,0);
  assert('player switches', sb.currentPlayer==='O');
  assert('cell set', sb.boards[0][0]==='X');
  assert('immutable', sa.boards[0][0]===null);
  assert('activeBoard set', sb.activeBoard===0);
  console.groupEnd();

  console.group('getWinner / isTerminal');
  assert('initial null', getWinner(createInitialState())===null);
  assert('all draw → draw', getWinner({...createInitialState(),macroStatus:Array(9).fill('draw')})==='draw');
  const msO=Array(9).fill('draw'); msO[0]=msO[4]=msO[8]='O';
  assert('O diag win', getWinner({...createInitialState(),macroStatus:msO})==='O');
  console.groupEnd();

  console.group('Free-choice when target closed');
  const sf=createInitialState();
  const msf=sf.macroStatus.slice(); msf[5]='X';
  const sf2={...sf,macroStatus:msf};
  const sf3=applyMove(sf2,0,5);
  assert('activeBoard null', sf3.activeBoard===null);
  const bf=[...new Set(getLegalMoves(sf3).map(m=>m.board))];
  assert('8 open boards', bf.length===8);
  assert('closed board excluded', !bf.includes(5));
  console.groupEnd();

  console.groupEnd();
  console.log(`\nResults: ${passed} passed, ${failed} failed`);
  return { passed, failed };
}

window.game = { createInitialState, getLegalMoves, applyMove, checkLocalWin, checkMacroWin, getWinner, isTerminal };
window.runPhase1Tests = runPhase1Tests;

/* ── Bootstrap ─────────────────────────────────────────────────── */
syncDifficultyVisibility();
init();
</script>
